# CI for the static portfolio site.
# Runs format checks on merge requests. Lightweight, no build step.

stages:
  - validate

format-check:
  stage: validate
  image: node:20-alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - npm install --no-audit --no-fund
    - npm run format:check
  allow_failure: true
