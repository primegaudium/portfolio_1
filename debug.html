<!DOCTYPE html>
<html>
<head>
    <title>Debug - Portfolio Loading</title>
</head>
<body>
    <h1>Debug Console</h1>
    <div id="log"></div>
    <script>
        const log = document.getElementById('log');
        
        // Test loading each image
        const images = [
            'assets/images/slide-01-hero.png',
            'assets/images/slide-02-about.jpg',
            'assets/images/slide-03-projects.jpg',
            'assets/videos/slide-04-skills.mp4',
            'assets/images/slide-05-leadership.jpg',
            'assets/images/slide-06-contact.png'
        ];
        
        images.forEach(src => {
            const isVideo = src.includes('.mp4');
            
            if (isVideo) {
                const video = document.createElement('video');
                video.src = src;
                video.onloadeddata = () => {
                    log.innerHTML += `<p style="color:green">✓ ${src} loaded (${video.videoWidth}x${video.videoHeight})</p>`;
                };
                video.onerror = (e) => {
                    log.innerHTML += `<p style="color:red">✗ ${src} failed: ${e.message}</p>`;
                };
            } else {
                const img = new Image();
                img.onload = () => {
                    log.innerHTML += `<p style="color:green">✓ ${src} loaded (${img.width}x${img.height})</p>`;
                };
                img.onerror = (e) => {
                    log.innerHTML += `<p style="color:red">✗ ${src} failed</p>`;
                };
                img.src = src;
            }
        });
        
        // Test THREE.js import
        setTimeout(() => {
            import('https://esm.sh/three').then(() => {
                log.innerHTML += '<p style="color:green">✓ THREE.js loaded successfully</p>';
            }).catch(e => {
                log.innerHTML += `<p style="color:red">✗ THREE.js failed: ${e.message}</p>`;
            });
        }, 1000);
    </script>
</body>
</html>
